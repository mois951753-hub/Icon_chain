{% extends "base.html" %}

{% block title %}登录 - 图标地书接龙{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>🔐 登录账号</h2>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" 
                       name="username" 
                       value="{{ username or '' }}"
                       placeholder="请输入用户名"
                       required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <div class="password-wrapper">
                    <input type="password" 
                           name="password" 
                           id="password"
                           placeholder="请输入密码"
                           required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                        <span class="eye-icon eye-open">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                        <span class="eye-icon eye-closed" style="display: none;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
            
            {% if errors %}
            <div class="alert alert-error">
                {% for error in errors %}
                    <p>⚠️ {{ error }}</p>
                {% endfor %}
            </div>
            {% endif %}
            
            <button type="submit" class="btn-submit">登录</button>
        </form>
        
        <div class="auth-footer">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const eyeOpen = button.querySelector('.eye-open');
    const eyeClosed = button.querySelector('.eye-closed');
    
    if (input.type === "password") {
        input.type = "text";
        eyeOpen.style.display = "none";
        eyeClosed.style.display = "inline-block";
    } else {
        input.type = "password";
        eyeOpen.style.display = "inline-block";
        eyeClosed.style.display = "none";
    }
}
</script>
{% endblock %}
